{{- if and .Values.metrics.enabled .Values.metrics.serviceMonitor.enabled (not .Values.dryRun.enabled) }}
{{- if .Values.metrics.gke }}
# GKE-specific monitoring
apiVersion: monitoring.googleapis.com/v1
kind: PodMonitoring
metadata:
  name: {{ .Values.scheduler.name }}-monitor
  namespace: {{ .Release.Namespace }}
  labels:
    component: scheduler
    tier: control-plane
    part-of: compute-gardener-scheduler
    {{- include "compute-gardener-scheduler.exporterLabels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      component: scheduler
      tier: control-plane
  endpoints:
  - port: https
    scheme: https
    path: /metrics
    interval: {{ .Values.metrics.serviceMonitor.interval }}
    tlsConfig:
      insecureSkipVerify: {{ .Values.metrics.serviceMonitor.insecureSkipVerify }}
{{- else }}
# Standard Prometheus Operator.
# Prerequisite: the Prometheus Operator CRDs (specifically ServiceMonitor) must already
# be installed in the cluster, e.g.:
#   kubectl apply -f https://raw.githubusercontent.com/prometheus-operator/prometheus-operator/main/example/prometheus-operator-crd/monitoring.coreos.com_servicemonitors.yaml
# If you don't have Prometheus Operator, set metrics.serviceMonitor.enabled=false (or use
# the *-no-metrics raw manifest) to skip this resource.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Values.scheduler.name }}-monitor
  # Default Prometheus namespace; change to match your setup (e.g. cattle-monitoring-system on Rancher).
  namespace: {{ .Values.metrics.serviceMonitor.namespace }}
spec:
  selector:
    matchLabels:
      component: scheduler
      tier: control-plane
  endpoints:
  - port: https 
    scheme: https
    path: /metrics
    interval: {{ .Values.metrics.serviceMonitor.interval }}
    bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    tlsConfig:
      insecureSkipVerify: {{ .Values.metrics.serviceMonitor.insecureSkipVerify }}
  namespaceSelector:
    matchNames:
    - {{ .Release.Namespace }}
{{- end }}
{{- end }}